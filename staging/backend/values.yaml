image:
  repository: 302954730632.dkr.ecr.us-east-1.amazonaws.com/pdm-backend
  tag: d375efacbc8a5da729e17a1f8066066273fccb5e

replicaCount: 1

autoscaling:
  enabled: false

# staging has its own database (pdm_staging) + user on the shared RDS instance,
# isolated from production's pdm database.
rds:
  host: "pdm-prod-eks-postgres.ci3ceikmuv20.us-east-1.rds.amazonaws.com"

postgres:
  user: "pdm_staging"
  database: "pdm_staging"

# DB password is sourced from AWS Secrets Manager by External Secrets Operator.
externalSecrets:
  enabled: true
  passwordSecretName: pdm/staging/db-password
