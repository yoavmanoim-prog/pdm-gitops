# Cluster-wide store telling External Secrets Operator how to reach AWS Secrets
# Manager. ESO authenticates with the controller ServiceAccount's IRSA role
# (pdm-external-secrets-<env>, created in pdm-infra), so no AWS keys live here.
# Backend ExternalSecrets (rendered by the pdm-app Helm chart) reference this
# store by name: aws-secrets-manager.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  annotations:
    # tolerate the CRD not existing yet on the very first sync
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
