# Deploys the ClusterSecretStore. Kept in its own Application (not the backend
# app) because the store is cluster-scoped — one per cluster, not per namespace.
# External Secrets Operator itself is installed by pdm-infra (helm_release), so
# its CRDs already exist by the time this syncs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-store
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yoavmanoim-prog/pdm-gitops
    targetRevision: HEAD
    path: external-secrets/store/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 3m
