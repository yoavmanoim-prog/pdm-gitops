# Dev environment — deployed on every feature branch push
# lightweight: 1 replica, no autoscaling, minimal resources
image:
  repository: 302954730632.dkr.ecr.us-east-1.amazonaws.com/pdm-backend
  tag: d375efacbc8a5da729e17a1f8066066273fccb5e

replicaCount: 1

autoscaling:
  enabled: false

# dev has its own database (pdm_dev) + user on the shared RDS instance.
rds:
  host: "pdm-prod-eks-postgres.ci3ceikmuv20.us-east-1.rds.amazonaws.com"

postgres:
  user: "pdm_dev"
  database: "pdm_dev"

# DB password is sourced from AWS Secrets Manager by External Secrets Operator.
externalSecrets:
  enabled: true
  passwordSecretName: pdm/dev/db-password
