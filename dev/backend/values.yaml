# Dev environment — deployed on every feature branch push
# lightweight: 1 replica, no autoscaling, minimal resources
image:
  repository: 302954730632.dkr.ecr.us-east-1.amazonaws.com/pdm-backend
  tag: 9d5a75d7e476f0e6cf7fd484ff131914ae0b20aa

replicaCount: 0

autoscaling:
  enabled: false

# uses the same RDS instance as staging (dev shares the database)
rds:
  host: "pdm-prod-eks-postgres.ci3ceikmuv20.us-east-1.rds.amazonaws.com"

postgres:
  user: "pdm"
  database: "pdm"

# DB password is sourced from AWS Secrets Manager (pdm/backend/db-password) by
# External Secrets Operator — never stored here. See the chart's externalSecrets.
externalSecrets:
  enabled: true
