image:
  repository: 302954730632.dkr.ecr.us-east-1.amazonaws.com/pdm-backend
  tag: v2.0.0

replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

# point to RDS instead of the local postgres StatefulSet
rds:
  host: "pdm-prod-eks-postgres.ci3ceikmuv20.us-east-1.rds.amazonaws.com"

postgres:
  user: "pdm"
  database: "pdm"

# DB password is sourced from AWS Secrets Manager (pdm/backend/db-password) by
# External Secrets Operator — never stored here.
externalSecrets:
  enabled: true
  jwtSecretName: pdm/backend/jwt-secret
  bootstrapAdminPasswordSecretName: pdm/backend/bootstrap-admin-password

# User pool: seed the first admin on deploy and sign tokens with the real secret.
auth:
  bootstrapAdminEmail: yoav@pdm.com
  jwtSecretEnabled: true

vaultMode: "remote"
corsOrigins: "http://localhost:3000,http://localhost:5173,https://d3df2y18th5fg7.cloudfront.net"

ingress:
  host: ""                 # catch-all: CloudFront forwards its own Host header
