apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pdm-backend-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yoavmanoim-prog/pdm-gitops
    targetRevision: HEAD
    path: production/backend
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: pdm-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
